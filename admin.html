<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Koyrasoft</title>
  <link rel="icon" type="image/png" href="logos/logo-k-brand.png">
  <style>
    :root { --text:#f8fafc; --muted:#a9b4c7; --gold:#f2c768; --stroke:rgba(255,255,255,.12); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:Inter,system-ui,sans-serif;
      min-height:100vh; display:grid; place-items:center; padding:24px;
      background:linear-gradient(180deg,#05070d,#070915); color:var(--text);
    }
    .card {
      max-width:520px; width:100%; padding:32px; border-radius:24px;
      background:rgba(255,255,255,.07); border:1px solid var(--stroke);
    }
    h1 { font-size:1.35rem; margin-bottom:8px; }
    p { color:var(--muted); line-height:1.6; margin-bottom:14px; font-size:.95rem; }
    .btn {
      display:inline-block; margin-top:8px; padding:14px 22px; border-radius:999px;
      background:linear-gradient(135deg,var(--gold),#e7e9ee); color:#070707;
      font-weight:800; text-decoration:none; font-size:.95rem;
    }
    .btn:hover { opacity:.92; }
    .note {
      margin-top:20px; padding:14px; border-radius:12px; font-size:.85rem;
      background:rgba(60,121,255,.1); border:1px solid rgba(60,121,255,.25); color:#b8d0ff;
    }
    .note ol { margin:10px 0 0 18px; line-height:1.7; }
    .back { display:inline-block; margin-top:20px; color:var(--gold); font-size:.88rem; }
    code { font-size:.82rem; word-break:break-all; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Administration Koyrasoft</h1>
    <p>Tableau de bord privé (statistiques &amp; visiteurs). Rien n’est affiché aux visiteurs du site.</p>
    <p>Cliquez ci-dessous pour ouvrir l’admin hébergé sur Google Apps Script :</p>
    <a class="btn" id="adminLink" href="#" target="_blank" rel="noopener noreferrer">Ouvrir le tableau de bord →</a>
    <p class="note" id="help" hidden></p>
    <a class="back" href="index.html">← Retour au site</a>
  </main>

  <script src="data/site-data.js"></script>
  <script>
    (function () {
      var base = (window.KOYRASOFT_SITE && window.KOYRASOFT_SITE.analytics && window.KOYRASOFT_SITE.analytics.scriptUrl || "").trim();
      var link = document.getElementById("adminLink");
      var help = document.getElementById("help");

      if (!base) {
        link.hidden = true;
        help.hidden = false;
        help.textContent = "URL analytics manquante dans site.json.";
        return;
      }

      /* Pas de redirection auto — lien explicite, compte Google #0 (koyra.com@gmail.com) */
      var adminUrl = base.replace(/\/u\/\d+\//, "/") + (base.indexOf("?") >= 0 ? "&" : "?") + "action=admin&authuser=0";
      link.href = adminUrl;

      help.hidden = false;
      help.innerHTML =
        "<strong>Si vous voyez une erreur Google (fichier introuvable) :</strong>" +
        "<ol>" +
        "<li>Connectez-vous avec <strong>koyra.com@gmail.com</strong> (fenêtre privée recommandée).</li>" +
        "<li>Dans Apps Script : Déployer → <strong>Exécuter : Moi</strong> · <strong>Accès : Tout le monde</strong>.</li>" +
        "<li>Collez la dernière version de <code>analytics.gs</code> et redéployez une nouvelle version.</li>" +
        "</ol>" +
        "<p style='margin-top:10px'>Lien direct : <code id='rawUrl'></code></p>";
      document.getElementById("rawUrl").textContent = adminUrl;
    })();
  </script>
</body>
</html>
