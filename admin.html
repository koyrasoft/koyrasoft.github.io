<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Koyrasoft</title>
  <link rel="icon" type="image/png" href="logos/logo-k-brand.png">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-shell">
    <section class="card login-card">
      <h2>Administration Koyrasoft</h2>
      <p>Redirection vers le tableau de bord sécurisé (Google Apps Script)…</p>
      <div id="status" class="alert alert-info">Chargement…</div>
      <p class="meta-line"><a href="index.html">← Retour au site</a></p>
    </section>
  </div>

  <script src="data/site-data.js"></script>
  <script>
    (function () {
      var status = document.getElementById("status");
      var url = (window.KOYRASOFT_SITE && window.KOYRASOFT_SITE.analytics && window.KOYRASOFT_SITE.analytics.scriptUrl || "").trim();

      if (!url) {
        status.className = "alert alert-error";
        status.textContent = "URL analytics manquante dans site.json.";
        return;
      }

      var adminUrl = url + (url.indexOf("?") >= 0 ? "&" : "?") + "action=admin";
      status.innerHTML = 'Ouverture de l\'admin… <a href="' + adminUrl + '">Cliquez ici si la redirection ne démarre pas</a>.';
      window.location.replace(adminUrl);
    })();
  </script>
</body>
</html>
